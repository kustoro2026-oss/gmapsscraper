name: gmaps_scraper_desktop
description: Google Maps Scraper — Desktop App (Windows)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.0
  csv: ^6.0.0
  file_picker: ^8.0.0
  url_launcher: ^6.3.0
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/scraper/
    - assets/logo/
