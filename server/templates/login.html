<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register — GMaps Scraper</title>
    <style>
        :root { --bg:#0a0f1f; --bg2:#111827; --border:#1e293b; --txt:#e2e8f0; --dim:#94a3b8; --blue:#3b82f6; --red:#ef4444; --green:#22c55e; --r:12px; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--txt); display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
        .container { width:100%; max-width:420px; }
        .logo { text-align:center; margin-bottom:32px; }
        .logo a { font-size:24px; font-weight:800; color:white; text-decoration:none; }
        .logo a span { color:var(--blue); }
        .tabs { display:flex; background:var(--bg2); border-radius:var(--r); padding:4px; margin-bottom:24px; border:1px solid var(--border); }
        .tab { flex:1; padding:10px; text-align:center; border-radius:10px; cursor:pointer; font-size:14px; font-weight:600; color:var(--dim); border:none; background:none; transition:all 0.2s; }
        .tab.active { background:var(--blue); color:white; }
        .card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:28px; }
        .card h2 { font-size:20px; margin-bottom:6px; }
        .card .sub { color:var(--dim); font-size:14px; margin-bottom:24px; }
        label { display:block; font-size:13px; color:var(--dim); margin-bottom:5px; }
        input { width:100%; padding:11px 14px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--txt); font-size:15px; margin-bottom:14px; }
        input:focus { outline:none; border-color:var(--blue); }
        .btn { width:100%; padding:13px; border-radius:8px; border:none; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.15s; }
        .btn-blue { background:var(--blue); color:white; }
        .btn-blue:hover { background:#2563eb; }
        .btn-blue:disabled { background:#475569; cursor:not-allowed; }
        .msg { font-size:13px; margin-top:12px; text-align:center; }
        .msg-err { color:var(--red); }
        .msg-ok { color:var(--green); }
        .hidden { display:none; }
        .back { text-align:center; margin-top:20px; }
        .back a { color:var(--dim); text-decoration:none; font-size:13px; }
        .back a:hover { color:white; }
        .hint { font-size:12px; color:var(--dim); margin-top:-8px; margin-bottom:14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <a href="/">GMaps<span>Scraper</span></a>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showForm('login')">Login</button>
        <button class="tab" onclick="showForm('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div class="card" id="form-login">
        <h2>Login</h2>
        <p class="sub">Masuk dengan email & password.</p>
        <form onsubmit="doLogin(event)">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="kamu@email.com" required autofocus>
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Password kamu" required>
            <button type="submit" class="btn btn-blue" id="login-btn">Masuk</button>
        </form>
        <div id="login-msg" class="msg hidden"></div>
    </div>

    <!-- Register Form -->
    <div class="card hidden" id="form-register">
        <h2>Register</h2>
        <p class="sub">Buat akun baru. Gratis 10x scraping.</p>
        <form onsubmit="doRegister(event)">
            <label>Nama</label>
            <input type="text" id="reg-name" placeholder="Nama kamu" required>
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="Gunakan email aktif (contoh: kamu@gmail.com)" required>
            <label>Password</label>
            <input type="password" id="reg-password" placeholder="Minimal 6 karakter" required minlength="6">
            <button type="submit" class="btn btn-blue" id="reg-btn">Daftar Sekarang</button>
        </form>
        <div id="reg-msg" class="msg hidden"></div>
    </div>

    <div class="back"><a href="/">← Kembali ke Beranda</a></div>
</div>

<script>
// Auto-redirect ke dashboard kalau sudah login
if (localStorage.getItem("token") && localStorage.getItem("user")) {
    window.location.href = "/dashboard";
}

function showForm(type) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById("form-login").classList.add("hidden");
    document.getElementById("form-register").classList.add("hidden");
    document.getElementById("form-" + type).classList.remove("hidden");
    if (type === "login") document.querySelectorAll(".tab")[0].classList.add("active");
    else document.querySelectorAll(".tab")[1].classList.add("active");
    document.getElementById("login-msg").classList.add("hidden");
    document.getElementById("reg-msg").classList.add("hidden");
}

function setMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = "msg msg-" + type;
    el.classList.remove("hidden");
}

async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById("login-btn");
    btn.disabled = true; btn.textContent = "Masuk...";
    setMsg("login-msg", "", "ok");
    try {
        const fd = new FormData();
        fd.append("email", document.getElementById("login-email").value.trim());
        fd.append("password", document.getElementById("login-password").value);
        const resp = await fetch("/api/auth/login", { method:"POST", body:fd });
        const data = await resp.json();
        if (data.success) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.user));
            if (data.api_key) localStorage.setItem("api_key", data.api_key);
            window.location.href = "/dashboard";
        } else {
            setMsg("login-msg", data.detail || "Login gagal", "err");
            if (data.detail && data.detail.includes("belum diverifikasi")) {
                document.getElementById("login-msg").innerHTML += ' <br><a href="#" onclick="resendVerify(\''+document.getElementById("login-email").value.trim()+'\');return false;" style="color:var(--blue);font-size:12px;">Kirim ulang email verifikasi</a>';
            }
        }
    } catch (err) {
        setMsg("login-msg", "Gagal koneksi: " + err.message, "err");
    }
    btn.disabled = false; btn.textContent = "Masuk";
}

async function resendVerify(email) {
    if (!email) { alert("Masukkan email dulu"); return; }
    const fd = new FormData(); fd.append("email", email);
    try {
        const resp = await fetch("/api/auth/resend-verification", { method:"POST", body:fd });
        const data = await resp.json();
        setMsg("login-msg", data.message || "Link dikirim!", "ok");
    } catch(e) {
        setMsg("login-msg", "Gagal: "+e.message, "err");
    }
}

async function doRegister(e) {
    e.preventDefault();
    const btn = document.getElementById("reg-btn");
    btn.disabled = true; btn.textContent = "Mendaftar...";
    setMsg("reg-msg", "", "ok");
    try {
        const pw = document.getElementById("reg-password").value;
        if (pw.length < 6) { setMsg("reg-msg", "Password minimal 6 karakter", "err"); btn.disabled=false; btn.textContent="Daftar Sekarang"; return; }
        const fd = new FormData();
        fd.append("name", document.getElementById("reg-name").value.trim());
        fd.append("email", document.getElementById("reg-email").value.trim());
        fd.append("password", pw);
        const resp = await fetch("/api/auth/register", { method:"POST", body:fd });
        const data = await resp.json();
        if (data.success) {
            if (data.need_verify) {
                let msg = data.message;
                if (data.verify_url) {
                    msg += '<br><a href="'+data.verify_url+'" style="color:var(--green);font-size:13px;">👉 Klik di sini untuk verifikasi email</a>';
                } else {
                    msg += '<br><small style="color:var(--dim);">Belum dapat email? <a href="#" onclick="resendVerify(\''+document.getElementById("reg-email").value.trim()+'\');return false;" style="color:var(--blue);">Kirim ulang</a></small>';
                }
                setMsg("reg-msg", msg, "ok");
                document.getElementById("reg-btn").style.display = "none";
            } else {
                localStorage.setItem("token", data.token);
                localStorage.setItem("user", JSON.stringify(data.user));
                if (data.api_key) localStorage.setItem("api_key", data.api_key);
                setTimeout(() => { window.location.href = "/dashboard"; }, 800);
            }
        } else {
            setMsg("reg-msg", data.detail || "Registrasi gagal", "err");
        }
    } catch (err) {
        setMsg("reg-msg", "Gagal koneksi: " + err.message, "err");
    }
    btn.disabled = false; btn.textContent = "Daftar Sekarang";
}
</script>
</body>
</html>
