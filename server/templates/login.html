<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — GMaps Scraper</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #1e293b; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; border: 1px solid #334155; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: #94a3b8; margin-bottom: 28px; }
        label { display: block; font-size: 14px; margin-bottom: 6px; color: #cbd5e1; }
        input[type="email"], input[type="text"] { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 16px; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #3b82f6; }
        button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: #3b82f6; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .error { color: #ef4444; font-size: 14px; margin-top: 12px; }
        .success { color: #22c55e; font-size: 14px; margin-top: 12px; }
        .hidden { display: none; }
        .otp-group { display: flex; gap: 8px; }
        .otp-group input { width: 48px; text-align: center; font-size: 24px; padding: 12px 0; }
        .back-link { margin-top: 20px; text-align: center; }
        .back-link a { color: #3b82f6; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
<div class="card">
    <h1>Login</h1>
    <p>Masuk dengan email — tanpa password.</p>
    <form id="email-form">
        <label>Email</label>
        <input type="email" id="email" placeholder="kamu@email.com" required autofocus>
        <button type="submit" id="send-btn">Kirim Kode OTP</button>
    </form>
    <form id="otp-form" class="hidden">
        <label>Kode OTP (6 digit)</label>
        <input type="text" id="otp" placeholder="123456" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
        <button type="submit" id="verify-btn">Verifikasi & Masuk</button>
    </form>
    <div id="message"></div>
    <div class="back-link"><a href="/">← Kembali ke Beranda</a></div>
</div>

<script>
const emailForm = document.getElementById("email-form");
const otpForm = document.getElementById("otp-form");
const msgDiv = document.getElementById("message");

emailForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    if (!email) return;
    msgDiv.textContent = "";
    msgDiv.className = "";

    const btn = document.getElementById("send-btn");
    btn.disabled = true;
    btn.textContent = "Mengirim...";

    try {
        const fd = new FormData();
        fd.append("email", email);
        const resp = await fetch("/api/auth/send-otp", { method: "POST", body: fd });
        const data = await resp.json();
        if (data.success) {
            msgDiv.className = "success";
            msgDiv.textContent = "OTP dikirim! Cek email kamu.";
            emailForm.classList.add("hidden");
            otpForm.classList.remove("hidden");
            document.getElementById("otp").focus();
        } else {
            msgDiv.className = "error";
            msgDiv.textContent = data.detail || "Gagal mengirim OTP";
        }
    } catch (err) {
        msgDiv.className = "error";
        msgDiv.textContent = "Gagal koneksi: " + err.message;
    }
    btn.disabled = false;
    btn.textContent = "Kirim Kode OTP";
});

otpForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const otp = document.getElementById("otp").value.trim();
    if (otp.length !== 6) return;

    const btn = document.getElementById("verify-btn");
    btn.disabled = true;
    btn.textContent = "Memverifikasi...";

    try {
        const fd = new FormData();
        fd.append("email", email);
        fd.append("otp", otp);
        const resp = await fetch("/api/auth/verify", { method: "POST", body: fd });
        const data = await resp.json();
        if (data.success) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.user));
            localStorage.setItem("api_key", data.api_key);
            window.location.href = "/";
        } else {
            msgDiv.className = "error";
            msgDiv.textContent = data.detail || "OTP tidak valid";
        }
    } catch (err) {
        msgDiv.className = "error";
        msgDiv.textContent = "Gagal koneksi: " + err.message;
    }
    btn.disabled = false;
    btn.textContent = "Verifikasi & Masuk";
});
</script>
</body>
</html>
