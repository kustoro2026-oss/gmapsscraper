<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — GMaps Scraper</title>
    <style>
        :root { --bg:#0a0f1f; --bg2:#111827; --bg3:#1a2332; --border:#1e293b; --txt:#e2e8f0; --dim:#94a3b8; --blue:#3b82f6; --green:#22c55e; --orange:#f59e0b; --red:#ef4444; --r:12px; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--txt); }
        header { background:var(--bg2); border-bottom:1px solid var(--border); padding:14px 28px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:10; }
        header h1 { font-size:18px; color:var(--red); }
        header nav { display:flex; gap:6px; flex-wrap:wrap; }
        header nav button { padding:8px 16px; border-radius:8px; border:none; background:transparent; color:var(--dim); cursor:pointer; font-size:13px; font-weight:500; }
        header nav button:hover, header nav button.active { background:rgba(239,68,68,0.1); color:var(--red); }
        main { max-width:1300px; margin:0 auto; padding:24px; }
        .tab { display:none; }
        .tab.active { display:block; }
        .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; margin-bottom:28px; }
        .stat { background:var(--bg2); border-radius:var(--r); padding:22px; border:1px solid var(--border); }
        .stat .val { font-size:32px; font-weight:800; color:var(--blue); }
        .stat .lbl { font-size:13px; color:var(--dim); margin-top:4px; }
        .card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:22px; margin-bottom:20px; }
        .card h2 { font-size:16px; margin-bottom:14px; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th { text-align:left; padding:10px 8px; border-bottom:2px solid var(--border); color:var(--dim); font-weight:600; }
        td { padding:9px 8px; border-bottom:1px solid var(--bg3); }
        tr:hover td { background:rgba(239,68,68,0.04); }
        .badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:600; }
        .b-green { background:#065f46; color:var(--green); }
        .b-red { background:#7f1d1d; color:var(--red); }
        .b-yellow { background:#78350f; color:var(--orange); }
        .b-blue { background:#312e81; color:#818cf8; }
        .b-gray { background:var(--bg3); color:var(--dim); }
        button { padding:8px 16px; border-radius:8px; border:none; font-size:13px; font-weight:600; cursor:pointer; }
        .btn-red { background:var(--red); color:white; }
        .btn-blue { background:var(--blue); color:white; }
        .btn-green { background:var(--green); color:white; }
        .btn-outline { background:transparent; border:1px solid var(--border); color:var(--txt); }
        .btn-sm { padding:4px 12px; font-size:12px; }
        input,select { padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--txt); font-size:14px; }
        input:focus,select:focus { outline:none; border-color:var(--blue); }
        .flex { display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
        .paginate { display:flex; gap:6px; justify-content:center; margin-top:14px; }
        .paginate button { padding:6px 14px; border-radius:6px; background:var(--bg3); color:white; border:none; cursor:pointer; font-size:13px; }
        .paginate button.on { background:var(--blue); }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); display:flex; justify-content:center; align-items:center; z-index:100; }
        .modal-card { background:var(--bg2); border-radius:16px; padding:28px; max-width:640px; width:92%; max-height:82vh; overflow-y:auto; border:1px solid var(--border); }
        .modal-card h3 { margin-bottom:14px; }
        .hidden { display:none; }
    </style>
</head>
<body>
<header>
    <h1>ADMIN PANEL</h1>
    <nav>
        <button class="active" onclick="switchTab('dashboard')">Dashboard</button>
        <button onclick="switchTab('users')">Users</button>
        <button onclick="switchTab('transactions')">Transaksi</button>
        <button onclick="switchTab('activity')">Activity Log</button>
        <button onclick="window.open('/dashboard','_blank')">User Dashboard</button>
        <button onclick="localStorage.clear();window.location.reload()">Logout</button>
    </nav>
</header>

<main>
    <!-- Dashboard -->
    <div class="tab active" id="tab-dashboard">
        <div class="stats" id="stats-grid"></div>
        <div class="card">
            <h2>Recent Transactions</h2>
            <table><thead><tr><th>User</th><th>Paket</th><th>Jumlah</th><th>Status</th><th>Tanggal</th></tr></thead>
            <tbody id="recent-txns"></tbody></table>
        </div>
    </div>

    <!-- Users -->
    <div class="tab" id="tab-users">
        <div class="card">
            <div class="flex">
                <input type="search" id="user-search" placeholder="Cari email..." onkeyup="loadUsers()">
                <button class="btn-outline btn-sm" onclick="exportUsersCSV()">Export CSV</button>
            </div>
            <table><thead><tr><th>Email</th><th>Nama</th><th>Role</th><th>Lisensi</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody id="user-table"></tbody></table>
            <div class="paginate" id="user-pagination"></div>
        </div>
    </div>

    <!-- Transactions -->
    <div class="tab" id="tab-transactions">
        <div class="card">
            <div class="flex">
                <select id="txn-filter" onchange="loadTransactions()">
                    <option value="">Semua Status</option><option value="success">Success</option><option value="pending">Pending</option><option value="failed">Failed</option>
                </select>
                <input type="date" id="txn-date-from" onchange="loadTransactions()" placeholder="Dari" style="width:140px;">
                <input type="date" id="txn-date-to" onchange="loadTransactions()" placeholder="Sampai" style="width:140px;">
                <button class="btn-outline btn-sm" onclick="exportTxnsCSV()">Export CSV</button>
            </div>
            <table><thead><tr><th>User</th><th>Paket</th><th>Invoice</th><th>Jumlah</th><th>Status</th><th>Metode</th><th>Tanggal</th></tr></thead>
            <tbody id="txn-table"></tbody></table>
            <div class="paginate" id="txn-pagination"></div>
        </div>
    </div>

    <!-- Activity Log -->
    <div class="tab" id="tab-activity">
        <div class="card">
            <h2>Recent Admin Activity</h2>
            <table><thead><tr><th>Admin</th><th>Action</th><th>Target</th><th>Time</th></tr></thead>
            <tbody id="activity-table"><tr><td colspan="4" style="text-align:center;color:var(--dim);padding:30px;">Activity log via server logs</td></tr></tbody></table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal hidden" id="user-modal">
        <div class="modal-card" id="user-modal-content"></div>
    </div>
</main>

<script>
const TOKEN = localStorage.getItem("token");
const USER = JSON.parse(localStorage.getItem("user")||"null");
if(!TOKEN){window.location.href="/login";}if(!USER||USER.role!=="admin"){document.body.innerHTML='<div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#ef4444;font-size:20px;background:#0a0f1f;flex-direction:column;"><p>Access Denied — Admin Only</p><a href="/dashboard" style="color:#3b82f6;margin-top:16px;">Kembali ke Dashboard</a></div>';throw new Error("Not admin");}

function switchTab(t){document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));document.getElementById("tab-"+t).classList.add("active");document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));event.target.classList.add("active");if(t==="dashboard"){loadDashboard();loadRecentTxns();}if(t==="users")loadUsers();if(t==="transactions")loadTransactions();}
async function api(p,m="GET",b=null){const o={method:m,headers:{Authorization:"Bearer "+TOKEN}};if(b)o.body=b;const r=await fetch(p,o);if(r.status===401){localStorage.clear();window.location.href="/login";}return r.json();}

// Dashboard
async function loadDashboard(){const s=await api("/api/admin/stats");document.getElementById("stats-grid").innerHTML=`
    <div class="stat"><div class="val">${s.total_users}</div><div class="lbl">Total Users</div></div>
    <div class="stat"><div class="val">${s.active_licenses}</div><div class="lbl">Active Licenses</div></div>
    <div class="stat"><div class="val">Rp ${(s.total_revenue||0).toLocaleString()}</div><div class="lbl">Total Revenue</div></div>
    <div class="stat"><div class="val">${s.today_usage}</div><div class="lbl">Scrape Hari Ini</div></div>`;}
async function loadRecentTxns(){const d=await api("/api/admin/transactions?page=1");const tb=document.getElementById("recent-txns");if(!d.transactions||d.transactions.length===0){tb.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--dim);">Belum ada</td></tr>';return;}tb.innerHTML=d.transactions.slice(0,10).map(t=>`<tr><td>${esc(t.user_email)}</td><td>${t.product.toUpperCase()}</td><td>Rp ${t.amount.toLocaleString()}</td><td><span class="badge ${t.status==='success'?'b-green':t.status==='failed'?'b-red':'b-yellow'}">${t.status}</span></td><td>${t.created_at?.slice(0,16)||"-"}</td></tr>`).join("");}

// Users
async function loadUsers(page=1){const s=document.getElementById("user-search").value;const d=await api(`/api/admin/users?page=${page}&search=${encodeURIComponent(s)}`);document.getElementById("user-table").innerHTML=d.users.map(u=>`<tr><td>${esc(u.email)}</td><td>${esc(u.name||"-")}</td><td><span class="badge ${u.role==='admin'?'b-blue':'b-gray'}">${u.role}</span></td><td>${u.latest_license||"-"}</td><td>${u.is_banned?'<span class="badge b-red">BANNED</span>':'<span class="badge b-green">Active</span>'}</td><td><button class="btn-sm btn-blue" onclick="viewUser('${u.id}')">Detail</button>${u.is_banned?`<button class="btn-sm btn-outline" onclick="unbanUser('${u.id}')">Unban</button>`:`<button class="btn-sm btn-red" onclick="banUser('${u.id}')">Ban</button>`}</td></tr>`).join("");let p="";for(let i=1;i<=d.total_pages;i++)p+=`<button class="${i===page?'on':''}" onclick="loadUsers(${i})">${i}</button>`;document.getElementById("user-pagination").innerHTML=p;}

function exportUsersCSV(){if(!confirm("Export semua user ke CSV?"))return;fetch("/api/admin/users?page=1&search=",{headers:{Authorization:"Bearer "+TOKEN}}).then(r=>r.json()).then(d=>{let csv="Email,Nama,Role,Licensi,Status,Tanggal Daftar\n";d.users.forEach(u=>csv+=`"${u.email}","${u.name||""}","${u.role}","${u.latest_license||""}","${u.is_banned?'Banned':'Active'}","${u.created_at?.slice(0,10)||""}"\n`);downloadCSV(csv,"users.csv");});}

// Transactions
async function loadTransactions(page=1){const s=document.getElementById("txn-filter").value;const from=document.getElementById("txn-date-from").value;const to=document.getElementById("txn-date-to").value;let url=`/api/admin/transactions?page=${page}&status=${s}`;if(from)url+=`&date_from=${from}`;if(to)url+=`&date_to=${to}`;const d=await api(url);document.getElementById("txn-table").innerHTML=d.transactions.map(t=>`<tr><td>${esc(t.user_email)}</td><td>${t.product.toUpperCase()}</td><td style="font-family:monospace;font-size:12px;">${t.invoice_number||"-"}</td><td>Rp ${t.amount.toLocaleString()}</td><td><span class="badge ${t.status==='success'?'b-green':t.status==='failed'?'b-red':'b-yellow'}">${t.status}</span></td><td>${t.payment_method||"-"}</td><td>${t.created_at?.slice(0,16)||"-"}</td></tr>`).join("");let p="";for(let i=1;i<=d.total_pages;i++)p+=`<button class="${i===page?'on':''}" onclick="loadTransactions(${i})">${i}</button>`;document.getElementById("txn-pagination").innerHTML=p;}

function exportTxnsCSV(){if(!confirm("Export transaksi ke CSV?"))return;const s=document.getElementById("txn-filter").value;fetch(`/api/admin/transactions?page=1&status=${s}`,{headers:{Authorization:"Bearer "+TOKEN}}).then(r=>r.json()).then(d=>{let csv="User,Paket,Invoice,Jumlah,Status,Metode,Tanggal\n";d.transactions.forEach(t=>csv+=`"${t.user_email}","${t.product}","${t.invoice_number||""}","${t.amount}","${t.status}","${t.payment_method||""}","${t.created_at?.slice(0,16)||""}"\n`);downloadCSV(csv,"transactions.csv");});}

function downloadCSV(csv,fn){const b=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=fn;a.click();}

// User Detail
async function viewUser(uid){const d=await api(`/api/admin/users/${uid}`);const u=d.user;let licHtml=d.licenses.map(l=>`<div style="background:var(--bg);padding:12px;border-radius:8px;margin-bottom:8px;"><strong>${l.package.toUpperCase()}</strong> — ${l.used_quota}/${l.total_quota} (sisa ${l.remaining})<br><span style="color:var(--dim);font-size:12px;">Max scroll: ${l.max_scrolls} | ${l.is_active?"Active":"Inactive"} | ${l.created_at?.slice(0,10)}</span></div>`).join("")||'<p style="color:var(--dim);">Belum ada lisensi</p>';
document.getElementById("user-modal-content").innerHTML=`<h3>${esc(u.email)}</h3><p><strong>Nama:</strong> ${esc(u.name||"-")} | <strong>Role:</strong> ${u.role} | ${u.is_banned?'<span class="badge b-red">BANNED</span>':''}</p><p><strong>API Key:</strong> <code style="color:var(--green);">${u.api_key||"-"}</code></p><p><strong>Daftar:</strong> ${u.created_at?.slice(0,16)||"-"}</p><hr style="border-color:var(--border);margin:14px 0;"><h4>Lisensi</h4>${licHtml}<hr style="border-color:var(--border);margin:14px 0;"><div style="display:flex;gap:8px;flex-wrap:wrap;"><button class="btn-sm btn-blue" onclick="addQuota('${uid}')">+ Quota</button><button class="btn-sm btn-outline" onclick="editQuota('${uid}',${d.licenses[0]?.total_quota||0})">Edit Quota</button><div class="license-add-box" style="display:flex;gap:6px;align-items:center;"><select id="lic-pkg-${uid}" style="padding:4px 8px;border-radius:6px;font-size:12px;"><option value="starter">Starter</option><option value="basic">Basic</option><option value="pro">Pro</option><option value="bisnis">Bisnis</option></select><button class="btn-sm btn-green" onclick="addLicense('${uid}')">+ Lisensi</button></div><button class="btn-sm btn-outline" onclick="resetKey('${uid}')">Reset Key</button>${u.is_banned?`<button class="btn-sm btn-outline" onclick="closeModal();unbanUser('${uid}')">Unban</button>`:`<button class="btn-sm btn-red" onclick="closeModal();banUser('${uid}')">Ban</button>`}<button class="btn-sm btn-outline" onclick="closeModal()">Tutup</button></div>`;document.getElementById("user-modal").classList.remove("hidden");}
function closeModal(){document.getElementById("user-modal").classList.add("hidden");}
async function banUser(uid){const r=prompt("Alasan ban:")||"";const fd=new FormData();fd.append("reason",r);await api(`/api/admin/users/${uid}/ban`,"POST",fd);closeModal();loadUsers();}
async function unbanUser(uid){await api(`/api/admin/users/${uid}/unban`,"POST",new FormData());closeModal();loadUsers();}
async function addQuota(uid){const a=parseInt(prompt("Tambah quota:")||"0");if(!a||a<=0)return;const fd=new FormData();fd.append("amount",a.toString());await api(`/api/admin/users/${uid}/add-quota`,"POST",fd);alert("Quota +"+a);viewUser(uid);}
async function editQuota(uid,c){const n=parseInt(prompt("Total quota baru:",c)||"0");if(!n||n<=0)return;const fd=new FormData();fd.append("new_total",n.toString());await api(`/api/admin/users/${uid}/edit-quota`,"POST",fd);alert("Quota = "+n);viewUser(uid);}
async function resetKey(uid){if(!confirm("Reset API key?"))return;const d=await api(`/api/admin/users/${uid}/reset-key`,"POST",new FormData());alert("Key baru: "+d.new_api_key);viewUser(uid);}
async function addLicense(uid){const sel=document.getElementById("lic-pkg-"+uid);if(!sel)return;const pkg=sel.value;const fd=new FormData();fd.append("package_key",pkg);const d=await api(`/api/admin/users/${uid}/add-license`,"POST",fd);alert(d.message||"Lisensi ditambahkan!");closeModal();loadUsers();}
function esc(s){if(!s)return"";const d=document.createElement("div");d.textContent=s;return d.innerHTML;}
loadDashboard();loadRecentTxns();
</script>
</body>
</html>
