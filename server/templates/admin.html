<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — GMaps Scraper</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
        header { background: #1e293b; border-bottom: 1px solid #334155; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
        header h1 { font-size: 18px; color: #ef4444; }
        header nav a { color: #94a3b8; text-decoration: none; margin-left: 20px; font-size: 14px; }
        header nav a:hover, header nav a.active { color: #e2e8f0; }
        main { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-box { background: #1e293b; border-radius: 12px; padding: 24px; border: 1px solid #334155; }
        .stat-box .value { font-size: 36px; font-weight: 800; color: #3b82f6; }
        .stat-box .label { font-size: 13px; color: #94a3b8; margin-top: 4px; }
        .card { background: #1e293b; border-radius: 12px; padding: 24px; border: 1px solid #334155; margin-bottom: 20px; }
        .card h2 { font-size: 16px; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 12px 8px; border-bottom: 2px solid #334155; color: #94a3b8; font-weight: 600; }
        td { padding: 10px 8px; border-bottom: 1px solid #1e293b; }
        tr:hover td { background: rgba(59,130,246,0.05); }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-success { background: #065f46; color: #22c55e; }
        .badge-failed { background: #7f1d1d; color: #ef4444; }
        .badge-pending { background: #78350f; color: #f59e0b; }
        .badge-admin { background: #312e81; color: #818cf8; }
        .badge-user { background: #1e293b; color: #94a3b8; }
        .badge-banned { background: #7f1d1d; color: #fca5a5; }
        button { padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-sm { padding: 4px 12px; font-size: 12px; border-radius: 6px; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-outline { background: transparent; border: 1px solid #334155; color: #e2e8f0; }
        input[type="text"], input[type="number"], input[type="search"] { padding: 8px 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 14px; }
        .flex-row { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
        .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
        .pagination button { background: #334155; color: white; border: none; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #1e293b; border-radius: 16px; padding: 32px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; border: 1px solid #334155; }
        .modal-content h3 { margin-bottom: 16px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<header>
    <h1>ADMIN PANEL</h1>
    <nav>
        <a href="#" class="active" onclick="switchTab('dashboard')">Dashboard</a>
        <a href="#" onclick="switchTab('users')">Users</a>
        <a href="#" onclick="switchTab('transactions')">Transaksi</a>
        <a href="/" target="_blank">Web</a>
        <a href="#" onclick="localStorage.clear();window.location.reload()">Logout</a>
    </nav>
</header>

<main>
    <!-- Dashboard -->
    <div class="tab-content active" id="tab-dashboard">
        <div class="stats-grid" id="stats-grid"></div>
    </div>

    <!-- Users -->
    <div class="tab-content" id="tab-users">
        <div class="card">
            <div class="flex-row">
                <input type="search" id="user-search" placeholder="Cari email..." onkeyup="loadUsers()">
            </div>
            <table>
                <thead><tr><th>Email</th><th>Nama</th><th>Role</th><th>Lisensi</th><th>Status</th><th>Aksi</th></tr></thead>
                <tbody id="user-table"></tbody>
            </table>
            <div class="pagination" id="user-pagination"></div>
        </div>
    </div>

    <!-- Transactions -->
    <div class="tab-content" id="tab-transactions">
        <div class="card">
            <div class="flex-row">
                <select id="txn-filter" onchange="loadTransactions()">
                    <option value="">Semua Status</option>
                    <option value="success">Success</option>
                    <option value="pending">Pending</option>
                    <option value="failed">Failed</option>
                </select>
            </div>
            <table>
                <thead><tr><th>User</th><th>Paket</th><th>Jumlah</th><th>Status</th><th>Metode</th><th>Tanggal</th></tr></thead>
                <tbody id="txn-table"></tbody>
            </table>
            <div class="pagination" id="txn-pagination"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal hidden" id="user-modal">
        <div class="modal-content" id="user-modal-content"></div>
    </div>
</main>

<script src="/static/admin.js"></script>
</body>
</html>
