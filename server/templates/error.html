<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — GMaps Scraper</title>
    <style>
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0a0f1f; color:#e2e8f0; display:flex; justify-content:center; align-items:center; min-height:100vh; text-align:center; padding:24px; }
        .code { font-size:120px; font-weight:800; color:#3b82f6; line-height:1; margin-bottom:8px; }
        h1 { font-size:28px; margin-bottom:12px; }
        p { color:#94a3b8; margin-bottom:32px; max-width:400px; }
        a { display:inline-block; padding:12px 28px; border-radius:10px; background:#3b82f6; color:white; text-decoration:none; font-weight:600; transition:background 0.2s; }
        a:hover { background:#2563eb; }
    </style>
</head>
<body>
<div>
    <div class="code">{{ code }}</div>
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>
    <a href="/">Kembali ke Beranda</a>
</div>
</body>
</html>
